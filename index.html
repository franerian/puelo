<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puelo Desarrollos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #172035;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .logo {
      width: 15vw;
      min-width: 120px;
      max-width: 220px;
      display: block;
    }

    .tagline {
      margin-top: 4vw;
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: clamp(0.65rem, 1.1vw, 1rem);
      letter-spacing: 0.45em;
      color: #e8e4dc;
      text-transform: uppercase;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <img class="logo" src="puelo_logo.png" alt="Puelo Desarrollos">
  <p class="tagline">En construcción</p>
</body>
</html>
